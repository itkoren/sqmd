name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Verify dist/index.js exists
        run: test -f dist/index.js

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        id: changelog
        run: |
          NOTES=$(bash scripts/extract-changelog.sh "${{ steps.tag.outputs.name }}")
          {
            echo 'body<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          PRERELEASE=""
          if echo "${{ steps.tag.outputs.name }}" | grep -q '-'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            $PRERELEASE \
            --verify-tag || \
          gh release edit "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes "${{ steps.changelog.outputs.body }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Diagnose OIDC exchange
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          # Fetch OIDC token with npm's expected audience
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm%3Aregistry.npmjs.org" | jq -r '.value // empty')
          echo "OIDC token chars: ${#OIDC_TOKEN}"
          if [[ -z "$OIDC_TOKEN" ]]; then
            echo "ERROR: no token with audience=npm:registry.npmjs.org"
            exit 1
          fi
          echo "::add-mask::$OIDC_TOKEN"
          # Decode claims (header.payload.sig — print payload)
          PAYLOAD=$(echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null || echo "decode_failed")
          echo "OIDC claims: $(echo "$PAYLOAD" | jq '{aud,iss,repository,repository_owner,job_workflow_ref,ref,environment}' 2>/dev/null || echo "$PAYLOAD")"
          # Try the exchange endpoint manually
          PKG="%40itkoren%2Fsqmd"
          EXCHANGE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/$PKG" 2>&1)
          echo "Exchange response: $(echo "$EXCHANGE" | grep -v 'HTTP_STATUS')"
          echo "Exchange HTTP status: $(echo "$EXCHANGE" | grep 'HTTP_STATUS')"

      - name: Publish to npm
        run: npm publish --provenance --access public
