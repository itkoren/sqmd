name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Verify dist/index.js exists
        run: test -f dist/index.js

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        id: changelog
        run: |
          NOTES=$(bash scripts/extract-changelog.sh "${{ steps.tag.outputs.name }}")
          {
            echo 'body<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          PRERELEASE=""
          if echo "${{ steps.tag.outputs.name }}" | grep -q '-'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            $PRERELEASE \
            --verify-tag || \
          gh release edit "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes "${{ steps.changelog.outputs.body }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          echo "npm version: $(npm --version)"
          # Fetch OIDC token with audience=npm for trusted publishing
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | jq -r .value)
          echo "::add-mask::$OIDC_TOKEN"
          # Show decoded claims for diagnosis (payload is not sensitive)
          PAYLOAD=$(echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null)
          echo "OIDC claims: $PAYLOAD"
          # Replace GitHub token with OIDC token in npm config
          npm config delete //registry.npmjs.org/:_authToken
          npm config set //registry.npmjs.org/:_authToken "$OIDC_TOKEN"
          npm publish --provenance --access public
